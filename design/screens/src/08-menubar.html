<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="tokens.css">
<style>
  body.backdrop { width: 760px; height: 520px; align-items: flex-start; justify-content: flex-end; }
  .mbar { position: absolute; top: 0; left: 0; right: 0; height: 34px;
    background: rgba(20,22,26,.7); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    display: flex; align-items: center; justify-content: flex-end; gap: 18px; padding: 0 18px;
    color: var(--text-translation); font-size: 12.5px; z-index: 3; }
  .glyph { display: flex; align-items: center; gap: 5px; background: rgba(255,255,255,.1); border-radius: 6px; padding: 4px 9px; }
  .glyph .d { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-live); box-shadow: 0 0 6px rgba(232,184,75,.6); }
  .glyph .b1 { width: 14px; height: 3.5px; border-radius: 2px; background: #e8eaee; }
  .glyph .b2 { width: 14px; height: 3px; border-radius: 2px; background: rgba(232,234,238,.38); margin-top: 3px; }
  .menu { margin: 42px 14px 0 0; width: 270px; padding: 8px; z-index: 4; }
  .mi { display: flex; align-items: center; padding: 8px 12px; border-radius: 8px;
    color: var(--text-original); font-size: 13.5px; }
  .mi .k { margin-left: auto; color: var(--text-meta); font-size: 12px; }
  .mi.hov { background: rgba(255,255,255,.09); }
  .mi.dim { color: var(--text-translation); }
  .sep { height: 1px; background: var(--hairline); margin: 6px 10px; }
  .gaugeline { display: flex; align-items: center; gap: 8px; padding: 6px 12px 8px; }
  .bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,.07); flex: 1; }
  .bar i { display: block; height: 100%; width: 37%; background: var(--accent-live); border-radius: 3px; }
</style></head>
<body class="backdrop"><div class="blob1"></div>
<div class="mbar">
  <span>⌥</span><span>🔊</span><span>📶</span><span>🔋</span>
  <div class="glyph"><div class="d"></div><div><div class="b1"></div><div class="b2"></div></div></div>
  <span class="mono">Thu 10:46</span>
</div>
<div class="glass menu">
  <div class="mi hov">Show LiveCap<span class="k">⌥Space</span></div>
  <div class="mi dim">Mode: Panel<span class="k">⌥⇧Space</span></div>
  <div class="sep"></div>
  <div class="mi dim" style="font-size:12px;color:var(--text-meta)">ENGINE — Claude CLI · Haiku</div>
  <div class="gaugeline"><div class="bar"><i></i></div><span class="mono t-meta" style="font-size:11.5px">$7.40/$20 · ≈32 hrs</span></div>
  <div class="sep"></div>
  <div class="mi">⏹ Stop captioning</div>
  <div class="mi dim">Open archive folder</div>
  <div class="sep"></div>
  <div class="mi dim">Settings…<span class="k">⌘,</span></div>
  <div class="mi dim">Quit LiveCap</div>
</div>
</body></html>
